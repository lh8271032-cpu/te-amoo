<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para você ❤️</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
        text-align: center;
        color: white;
    }

    h1 {
        margin-top: 50px;
        font-size: 2.5em;
    }

    .heart {
        font-size: 50px;
        animation: pulse 1s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.3); }
        100% { transform: scale(1); }
    }

    .buttons {
        margin-top: 40px;
    }

    button {
        padding: 15px 25px;
        margin: 10px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .yes {
        background-color: #ff4d6d;
        color: white;
    }

    .yes:hover {
        background-color: #ff1e4d;
    }

    .no {
        background-color: #444;
        color: white;
        position: absolute;
    }

    #message {
        margin-top: 30px;
        font-size: 22px;
        display: none;
    }
</style>
</head>
<body>

<div class="heart">❤️</div>

<h1>Você me ama? 😳</h1>

<div class="buttons">
    <button class="yes" onclick="showMessage()">SIM ❤️</button>
    <button class="no" onmouseover="moveButton()" id="noBtn">NÃO 😅</button>
</div>

<div id="message">
    Sabia!! 😍 Eu te amo muito ❤️ <br><br>
    <strong>R ❤️ G</strong>
</div>

<script>
function showMessage() {
    document.getElementById("message").style.display = "block";
}

function moveButton() {
    const btn = document.getElementById("noBtn");
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}
</script>

</body>
</html>
